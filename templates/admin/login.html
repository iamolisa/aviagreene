<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — AviaGreene</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    body { background: var(--navy); display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-card { background: hsl(40,30%,97%); width:100%; max-width:400px; padding:3rem; }
    .login-logo { text-align:center; margin-bottom:2.5rem; }
    .login-logo .logo-name { font-size:1.5rem; }
    .login-title { font-size:1.125rem; color:var(--navy); font-weight:600; margin-bottom:0.25rem; }
    .login-sub { font-size:0.85rem; color:var(--muted-fg); margin-bottom:2rem; }
    .login-error { background:hsl(0,70%,95%); border-left:3px solid hsl(0,60%,50%); color:hsl(0,60%,40%); padding:0.75rem 1rem; font-size:0.875rem; margin-bottom:1.5rem; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <a href="{{ url_for('home') }}" class="logo" style="justify-content:center;">
      <img src="/static/images/logo.png" alt="AviaGreene" style="height:36px;width:auto;object-fit:contain;" />
    </a>
  </div>
  <div class="login-title">Sign in</div>
  <div class="login-sub">Access the AviaGreene operations dashboard.</div>
  {% if error %}
  <div class="login-error">{{ error }}</div>
  {% endif %}
  <form method="POST" action="{{ url_for('admin_login') }}">
    <input type="hidden" name="next_url" value="{{ next_url or '' }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-field" style="margin-bottom:1rem;">
      <label>Username</label>
      <input type="text" name="username" required autofocus placeholder="admin" style="border:1px solid var(--border);padding:0.75rem;" />
    </div>
    <div class="form-field" style="margin-bottom:1.5rem;">
      <label>Password</label>
      <input type="password" name="password" required placeholder="••••••••" style="border:1px solid var(--border);padding:0.75rem;" />
    </div>
    <button type="submit" class="btn btn-green" style="width:100%;justify-content:center;">
      Sign In
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>
    </button>
  </form>
</div>
</body>
</html>
