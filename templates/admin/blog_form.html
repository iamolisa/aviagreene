{% extends "admin/base.html" %}
{% block title %}{{ 'Edit Post' if post else 'New Post' }} — AviaGreene Admin{% endblock %}

{% block content %}
<div class="admin-header">
  <h1>{{ 'Edit Post' if post else 'New Blog Post' }}</h1>
</div>

<form method="POST" style="max-width:800px;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div style="background:var(--card);border:1px solid var(--border);padding:2rem;display:flex;flex-direction:column;gap:1.5rem;">
    <div class="form-field">
      <label>Title <span class="req">*</span></label>
      <input type="text" name="title" required value="{{ post.title if post else '' }}" placeholder="Post title" style="border:1px solid var(--border);padding:0.75rem;font-size:1rem;" />
    </div>
    <div class="form-field">
      <label>Category</label>
      <select name="category" style="border:1px solid var(--border);padding:0.75rem;background:var(--bg);">
        {% for cat in ['News', 'Insights', 'Training', 'Operations', 'Industry'] %}
        <option value="{{ cat }}" {% if post and post.category == cat %}selected{% endif %}>{{ cat }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-field">
      <label>Excerpt</label>
      <textarea name="excerpt" rows="3" placeholder="Short summary shown in blog listing..." style="border:1px solid var(--border);padding:0.75rem;">{{ post.excerpt if post else '' }}</textarea>
    </div>
    <div class="form-field">
      <label>Full Content <span class="req">*</span></label>
      <textarea name="content" rows="12" required placeholder="Full post content..." style="border:1px solid var(--border);padding:0.75rem;">{{ post.content if post else '' }}</textarea>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <input type="checkbox" name="is_published" id="is_published" {% if not post or post.is_published %}checked{% endif %} style="width:auto;" />
      <label for="is_published" style="text-transform:none;letter-spacing:normal;font-size:0.9rem;color:var(--fg);">Publish immediately</label>
    </div>
    <div style="display:flex;gap:1rem;">
      <button type="submit" class="btn btn-green">{{ 'Save Changes' if post else 'Publish Post' }}</button>
      <a href="{{ url_for('admin_blog') }}" class="btn btn-navy">Cancel</a>
    </div>
  </div>
</form>
{% endblock %}
